<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyro Reports</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">Kyro Reports</div>
    </nav>

    <!-- Toast notification container -->
    <div id="toastContainer"></div>

    <div class="container">
        <section id="compile">

        <section>
            <h2>Validate and Compile Reports</h2>

            <div class="upload-section">
                <h3>1. Upload Template <span class="info-text-small">(Template: .xlsx file)</span></h3>
                <input type="file" id="templateInput" accept=".xlsx">
                <div id="templateInfo" class="file-info hidden"></div>
            </div>

            <div class="upload-section">
                <h3>2. Upload Reports ZIP <span class="info-text-small">(Reports: .zip file containing multiple .xlsx files)</span></h3>
                <input type="file" id="reportsInput" accept=".zip">
                <div id="reportsList" class="hidden"></div>
            </div>

            <div class="process-section">
                <div id="progressSection" class="hidden">
                    <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
                </div>
                <button id="downloadBtn" class="process-btn download-btn">COMPILE & DOWNLOAD XLSX</button>
            </div>
        </section>

        <hr>

        <section id="template">
            <h2>Prepare Template</h2>

            <div id="columnsPreview" class="preview full-width"></div>

            <textarea id="columnName" rows="3" placeholder="Column1, Column2, Column3"></textarea>
            <button onclick="createTemplate()" class="process-btn download-btn">DOWNLOAD TEMPLATE XLSX</button>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
